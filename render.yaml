# Render blueprint — deploy with one click via Render's "Blueprint" feature.
# Docs: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: piis-briefing
    runtime: node
    plan: free                          # change to "starter" ($7/mo) to avoid 15-min idle spin-down
    region: singapore                   # closest to Indian market sources; change as needed
    rootDir: backend/render
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /healthz
    autoDeploy: true
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false                     # set in Render dashboard, not in this file
      - key: PIIS_MODEL
        value: claude-sonnet-4-6
      - key: PIIS_MAX_SEARCHES
        value: "6"
      - key: CORS_ORIGIN
        sync: false                     # set to your Vercel domain, e.g. https://piis.vercel.app
      - key: NODE_VERSION
        value: "20"
